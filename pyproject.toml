[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "astroLACHESIS"
version = "0.0.1"
description = "Isochrone fitting with Bayesian Model Averaging"
requires-python = ">=3.11"
dependencies = [
    "lachesis-grids>=0.0.1",
    "numpy",
    "scipy",
    "h5py",
    "requests",
    "astropy",
    "astroquery",
    "regions",
    "pandas",
    "dynesty>=3.0.0",
    "numba",
    "arviz",
    "h5netcdf",
    "termcolor",
    "dustmaps>=1.0.14",
]

[project.optional-dependencies]
dev = [
    "pytest",
]

[tool.hatch.build.targets.wheel]
packages = ["lachesis"]

[tool.pytest.ini_options]
testpaths = ["tests"]
